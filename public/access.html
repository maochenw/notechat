<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteChat Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-border: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #f87171;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.18), transparent 35%),
        radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.55), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 14px 16px;
      background: #0f172a;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .error {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(127, 29, 29, 0.35);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      font-size: 0.92rem;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Access Required</h1>
    <p>Enter the access code for this NoteChat instance. Each browser tab requires its own access code entry.</p>
    <div id="error" class="error">Incorrect access code.</div>
    <form id="access-form" method="post" action="/access">
      <label for="code">Access Code</label>
      <input id="code" name="code" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Enter</button>
    </form>
  </main>

  <script>
    const TAB_STORAGE_KEY = "notechat_tab_token";
    const params = new URLSearchParams(window.location.search);
    const errorEl = document.getElementById("error");
    const form = document.getElementById("access-form");
    const codeInput = document.getElementById("code");

    sessionStorage.removeItem(TAB_STORAGE_KEY);

    if (params.get("error") === "1") {
      errorEl.classList.add("visible");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorEl.classList.remove("visible");

      const body = new URLSearchParams({ code: codeInput.value });

      try {
        const response = await fetch("/access-token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });

        if (!response.ok) {
          throw new Error("invalid");
        }

        const data = await response.json();
        sessionStorage.setItem(TAB_STORAGE_KEY, data.tabToken);
        window.location.replace("/app");
      } catch (_error) {
        errorEl.classList.add("visible");
        codeInput.select();
      }
    });
  </script>
</body>
</html>
