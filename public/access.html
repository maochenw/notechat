<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteChat Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #f8fbff;
      --bg-top: #ffffff;
      --bg-bottom: #eaf3fd;
      --panel: #ffffff;
      --panel-soft: #f3f8ff;
      --panel-border: #bfd0e2;
      --text: #253240;
      --muted: #5e7d99;
      --accent: #384959;
      --accent-hover: #2f3c4a;
      --danger: #f87171;
    }

    html, body {
      min-height: 100%;
      font-family: "Avenir Next", "SF Pro Text", "Segoe UI", -apple-system, sans-serif;
      background:
        radial-gradient(1200px 520px at 20% -10%, rgba(189, 221, 252, .18), transparent 60%),
        radial-gradient(900px 420px at 100% 0%, rgba(136, 189, 242, .14), transparent 55%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom) 45%, var(--bg-base));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: 0 16px 34px rgba(56, 73, 89, .14);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: .01em;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .error {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(127, 29, 29, 0.35);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      font-size: 0.92rem;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Access Required</h1>
    <p>Enter the access code for this NoteChat instance. Each browser tab requires its own access code entry.</p>
    <div id="error" class="error">Incorrect access code.</div>
    <form id="access-form" method="post" action="/access">
      <label for="code">Access Code</label>
      <input id="code" name="code" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Enter</button>
    </form>
  </main>

  <script>
    const TAB_STORAGE_KEY = "notechat_tab_token";
    const DEVICE_ID_KEY = "notechat_device_id";
    const params = new URLSearchParams(window.location.search);
    const errorEl = document.getElementById("error");
    const form = document.getElementById("access-form");
    const codeInput = document.getElementById("code");

    sessionStorage.removeItem(TAB_STORAGE_KEY);

    if (params.get("error") === "1") {
      errorEl.classList.add("visible");
    }

    function getOrCreateDeviceId() {
      try {
        const existing = `${localStorage.getItem(DEVICE_ID_KEY) || ""}`.trim();
        if (existing) return existing;
        const next = typeof crypto?.randomUUID === "function"
          ? crypto.randomUUID()
          : `dev-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;
        localStorage.setItem(DEVICE_ID_KEY, next);
        return next;
      } catch (_error) {
        return typeof crypto?.randomUUID === "function"
          ? crypto.randomUUID()
          : `dev-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;
      }
    }

    function getDeviceLabel() {
      const ua = `${navigator.userAgent || ""}`;
      const uaData = navigator.userAgentData || null;
      const isMobile = uaData?.mobile ?? /mobile|iphone|ipad|android/i.test(ua);
      const isTablet = /ipad|tablet/i.test(ua);

      const deviceType = isTablet ? "Tablet" : (isMobile ? "Mobile" : "Desktop");

      const os = (() => {
        const platform = `${uaData?.platform || navigator.platform || ""}`.toLowerCase();
        if (/iphone|ipad|ipod|ios/.test(platform) || /iphone|ipad|ipod/.test(ua.toLowerCase())) return "iOS";
        if (/android/.test(ua.toLowerCase())) return "Android";
        if (/mac/.test(platform)) return "macOS";
        if (/win/.test(platform)) return "Windows";
        if (/linux/.test(platform)) return "Linux";
        return "Unknown OS";
      })();

      const browser = (() => {
        const low = ua.toLowerCase();
        if (low.includes("edg/")) return "Edge";
        if (low.includes("chrome/") && !low.includes("edg/") && !low.includes("opr/")) return "Chrome";
        if (low.includes("safari/") && !low.includes("chrome/") && !low.includes("chromium/")) return "Safari";
        if (low.includes("firefox/")) return "Firefox";
        if (low.includes("opr/") || low.includes("opera/")) return "Opera";
        return "Browser";
      })();

      const screenSize = `${Math.max(screen.width, screen.height)}x${Math.min(screen.width, screen.height)}`;
      const model = `${uaData?.model || ""}`.trim();

      const parts = [deviceType, os, browser, screenSize];
      if (model) parts.splice(1, 0, model);
      return parts.join(" · ").slice(0, 64);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorEl.classList.remove("visible");

      const body = new URLSearchParams({ code: codeInput.value });

      try {
        const response = await fetch("/access-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "x-device-id": getOrCreateDeviceId(),
            "x-device-name": getDeviceLabel(),
          },
          body,
        });

        if (!response.ok) {
          throw new Error("invalid");
        }

        const data = await response.json();
        sessionStorage.setItem(TAB_STORAGE_KEY, data.tabToken);
        window.location.replace("/app");
      } catch (_error) {
        errorEl.classList.add("visible");
        codeInput.select();
      }
    });
  </script>
</body>
</html>
