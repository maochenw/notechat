<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decom</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .gallery {
        display: flex;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        padding: 1rem;
      }
      .choice {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: .4rem;
      }
      .choice .label {
        color: #e2e8f0;
        font-size: 1.05rem;
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        gap: .3rem;
      }
      .choice .arrow {
        font-size: .95rem;
      }
      .gallery a {
        display: block;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #334155;
      }
      .gallery img {
        display: block;
        width: min(42vw, 260px);
        height: min(42vw, 260px);
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="gallery">
      <div class="choice">
        <div class="label">不用了 <span class="arrow">↓</span></div>
        <a id="landing-link-1" href="/index-archived"><img src="/index.jpg" alt="Landing image"></a>
      </div>
      <div class="choice">
        <div class="label">继续用! <span class="arrow">↓</span></div>
        <a id="landing-link-2" href="/index-archived"><img id="sticker-image" src="/stickers/2.png" alt="Sticker image"></a>
      </div>
    </div>

    <script>
      const tabToken = sessionStorage.getItem("notechat_tab_token");
      if (!tabToken) {
        window.location.replace("/access");
      } else {
        const archivedHref = "/index-archived";
        document.getElementById("landing-link-1").href = archivedHref;
        document.getElementById("landing-link-2").href = archivedHref;
        document.getElementById("sticker-image").src = `/stickers/2.png?tab=${encodeURIComponent(tabToken)}`;
      }
    </script>
  </body>
</html>
