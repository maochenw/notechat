<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Up Your Room — Chat Off Record</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <h1 class="logo">Chat Off Record</h1>

      <!-- Error state -->
      <div id="error-state" class="hidden">
        <p class="destroyed-text" id="error-text">Something went wrong.</p>
        <button class="btn-primary" onclick="window.location.href='/'">Back to Home</button>
      </div>

      <!-- Room setup form -->
      <div id="setup-state">
        <p class="tagline">Payment successful! Set up your room.</p>

        <p class="prompt-text" style="margin-top:16px;color:var(--text);font-weight:600;">Choose your room URL</p>
        <div class="slug-input-row">
          <span class="slug-prefix">/p/</span>
          <input
            type="text"
            id="input-slug"
            placeholder="my-room-name"
            maxlength="40"
            autocomplete="off"
          />
        </div>
        <p id="slug-status" class="slug-status"></p>

        <p class="prompt-text" style="margin-top:16px;color:var(--text);font-weight:600;">What should we call you?</p>
        <div class="name-input-row">
          <input
            type="text"
            id="input-name"
            placeholder="e.g. Shadow, Guest42"
            maxlength="30"
            autocomplete="off"
          />
        </div>

        <p class="prompt-text" style="margin-top:16px;color:var(--text);font-weight:600;">Codeword (optional)</p>
        <div class="codeword-row">
          <input
            type="password"
            id="input-passphrase"
            class="admin-input"
            placeholder="Leave blank for no codeword"
            autocomplete="off"
          />
          <button type="button" id="btn-toggle-codeword" class="btn-toggle-vis" title="Show codeword">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <p class="privacy-note" style="margin-top:6px;">If set, everyone must enter the codeword to join. Without one, anyone with the link can enter.</p>

        <button id="btn-create" class="btn-primary" style="width:100%;margin-top:16px;" disabled>
          Create &amp; Enter Room
        </button>
      </div>
    </div>
  </div>

  <script src="/js/success.js"></script>
</body>
</html>
